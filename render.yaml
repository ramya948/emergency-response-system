services:
  # Backend Web Service
  - type: web
    name: emergency-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server/server.js
    envVars:
      - key: MONGO_URI
        sync: false
        placeholder: "Enter your MongoDB URI"
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        fromService:
          name: emergency-frontend
          type: web
          property: url

  # Frontend Static Site
  - type: web
    name: emergency-frontend
    env: static
    plan: free
    rootDirectory: client
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: emergency-backend
          type: web
          property: url
      - key: VITE_SOCKET_URL
        fromService:
          name: emergency-backend
          type: web
          property: url
